<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>llm-NOOBservability</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌲</text></svg>">
<link rel="stylesheet" href="/static/vendor/uPlot.min.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <span class="brand">🌲 NOOBservability</span>
  <button id="theme-toggle" title="toggle light/dark" aria-label="toggle theme">◐</button>
</header>

<main id="timeline" aria-live="polite"></main>

<div id="dock">
  <form id="ask-form" class="card">
    <h1 id="greeting">ask your logs &amp; metrics anything</h1>
    <div class="input-row">
      <input id="question" type="text" autocomplete="off" spellcheck="false"
             placeholder="did jellyfin log any errors in the last hour?" autofocus>
      <select id="since" title="lookback override">
        <option value="">auto</option>
        <option>15m</option><option>1h</option><option>6h</option>
        <option>24h</option><option>7d</option>
      </select>
      <button id="send" type="submit">ask</button>
    </div>
  </form>
</div>

<script src="/static/vendor/uPlot.iife.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
